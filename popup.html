<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: Calibri, Arial, sans-serif;
      font-size: 13px;
      background: #f5f7fa;
      color: #333;
    }
    .container { padding: 16px; }
    h1 {
      font-size: 16px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
    }
    .status-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      min-height: 40px;
      display: flex;
      align-items: center;
    }
    .status-box.error { border-color: #e74c3c; background: #fdecea; }
    .status-box.success { border-color: #27ae60; background: #e8f8f0; }
    .status-box.loading { border-color: #3498db; background: #ebf5fb; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3498db;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #4472C4;
      color: #fff;
    }
    .btn-primary:hover { background: #365a9e; }
    .btn-primary:disabled { background: #a0b8d9; cursor: not-allowed; }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #ccc; }
    .field-info {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
    .field-info span { color: #4472C4; font-weight: 600; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CNF Report Analyzer</h1>
    <div class="subtitle">apps.univanbd.com</div>

    <div id="statusBox" class="status-box">Ready to scrape</div>

    <button id="scrapeBtn" class="btn btn-primary">Scrape Current Report</button>

    <div id="resultInfo" class="field-info hidden">
      Detected <span id="fieldCount">0</span> fields &middot;
      <span id="rowCount">0</span> records
    </div>

    <button id="openQueryBtn" class="btn btn-secondary hidden">Open Query Builder</button>
  </div>
  <script src="lib/db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
